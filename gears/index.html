<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Adafruit — Gears Intro</title>
  <link rel="alternate"
        type="application/json+oembed"
        href="https://jwcooper.github.io/oembed-test/chart.oembed.json"
        title="Adafruit Gears Intro">
  <style>
    html, body { margin: 0; padding: 0; background: #1a0f2e; overflow: hidden; height: 100%; }
    #stage { display: block; width: 100%; height: 100%; }
    .reduced-motion-fallback {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      color: #fff; font: 800 clamp(2rem, 8vw, 5rem)/1 system-ui, sans-serif;
      letter-spacing: 0.12em;
      background: radial-gradient(ellipse at center, #2a1a55 0%, #150b2e 70%);
    }
    @media (prefers-reduced-motion: reduce) {
      #stage { display: none; }
      .reduced-motion-fallback { display: flex; }
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="reduced-motion-fallback" aria-label="Adafruit">ADAFRUIT</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

    const canvas = document.getElementById('stage');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    {
      const c = document.createElement('canvas');
      c.width = 4; c.height = 256;
      const cx = c.getContext('2d');
      const g = cx.createLinearGradient(0, 0, 0, 256);
      g.addColorStop(0,    '#2d1a5c');
      g.addColorStop(0.55, '#160a30');
      g.addColorStop(1,    '#22103a');
      cx.fillStyle = g;
      cx.fillRect(0, 0, 4, 256);
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      scene.background = tex;
    }
    scene.fog = new THREE.Fog(0x1f1140, 9, 28);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 0, 12);

    function resize() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    new ResizeObserver(resize).observe(canvas);
    resize();

    scene.add(new THREE.HemisphereLight(0xa896f0, 0x1a0f2e, 0.65));
    scene.add(new THREE.AmbientLight(0x506080, 0.45));

    const keyLight = new THREE.DirectionalLight(0xffe0b8, 1.7);
    keyLight.position.set(5, 4, 6);
    scene.add(keyLight);

    const purpleRim = new THREE.PointLight(0xc474ff, 9, 30);
    purpleRim.position.set(-6, 2, -3);
    scene.add(purpleRim);

    const cyanRim = new THREE.PointLight(0x5ce6ee, 6.5, 30);
    cyanRim.position.set(6, -3, -3);
    scene.add(cyanRim);

    const flashLight = new THREE.PointLight(0xffffff, 0, 25);
    flashLight.position.set(0, 0, 2);
    scene.add(flashLight);

    const starGeo = new THREE.BufferGeometry();
    const N = 500;
    const sp = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      sp[i*3]   = (Math.random() - 0.5) * 70;
      sp[i*3+1] = (Math.random() - 0.5) * 50;
      sp[i*3+2] = -Math.random() * 35 - 5;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
      color: 0xffffff, size: 0.05, transparent: true, opacity: 0.6,
    }));
    scene.add(stars);

    function createGear({ teeth = 16, root = 0.85, tip = 1.0, hole = 0.3, depth = 0.32 }) {
      const shape = new THREE.Shape();
      const step = (Math.PI * 2) / teeth;
      const pt = (a, r) => [Math.cos(a)*r, Math.sin(a)*r];
      for (let i = 0; i < teeth; i++) {
        const a0 = i * step;
        if (i === 0) shape.moveTo(...pt(a0, root));
        shape.lineTo(...pt(a0 + step * 0.20, tip));
        shape.lineTo(...pt(a0 + step * 0.60, tip));
        shape.lineTo(...pt(a0 + step * 0.80, root));
        shape.lineTo(...pt(a0 + step,        root));
      }
      const holePath = new THREE.Path();
      holePath.absarc(0, 0, hole, 0, Math.PI * 2, true);
      shape.holes.push(holePath);
      return new THREE.ExtrudeGeometry(shape, {
        depth, bevelEnabled: true, bevelSegments: 3,
        bevelSize: 0.04, bevelThickness: 0.04, curveSegments: 12,
      });
    }

    const gold   = new THREE.MeshStandardMaterial({ color: 0xe2a050, metalness: 0.95, roughness: 0.22 });
    const bronze = new THREE.MeshStandardMaterial({ color: 0xa6703a, metalness: 0.92, roughness: 0.36 });
    const steel  = new THREE.MeshStandardMaterial({ color: 0x6a6a82, metalness: 0.95, roughness: 0.28 });

    // gears live in upper / lower bands so the letters can occupy the center
    const gearSpecs = [
      { teeth: 22, scale: 1.5,  x: -3.8, y:  1.7, mat: gold,   dir:  1, startZ: -10 },
      { teeth: 18, scale: 1.15, x: -1.3, y:  2.2, mat: bronze, dir: -1, startZ:  -8 },
      { teeth: 14, scale: 1.0,  x:  1.3, y:  2.1, mat: steel,  dir:  1, startZ: -12 },
      { teeth: 20, scale: 1.4,  x:  3.7, y:  1.6, mat: gold,   dir: -1, startZ:  -9 },
      { teeth: 12, scale: 0.95, x: -3.1, y: -1.8, mat: bronze, dir: -1, startZ: -11 },
      { teeth: 10, scale: 0.85, x:  0.0, y: -2.3, mat: steel,  dir:  1, startZ:  -7 },
      { teeth: 16, scale: 1.05, x:  3.2, y: -1.8, mat: bronze, dir:  1, startZ:  -8 },
    ];

    const gears = gearSpecs.map((spec) => {
      const m = new THREE.Mesh(createGear({ teeth: spec.teeth }), spec.mat);
      m.scale.setScalar(spec.scale);
      m.userData = spec;
      m.position.set(spec.x, spec.y - 5, spec.startZ);
      m.rotation.z = Math.random() * Math.PI * 2;
      scene.add(m);
      return m;
    });

    const letterMeshes = [];
    const TEXT = 'ADAFRUIT';
    const FONT_URL = 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json';

    new FontLoader().load(FONT_URL, (font) => {
      const letters = [];
      let total = 0;
      const spacing = 0.10;
      for (const ch of TEXT) {
        const geo = new TextGeometry(ch, {
          font, size: 1.05, height: 0.28,
          curveSegments: 8, bevelEnabled: true,
          bevelThickness: 0.03, bevelSize: 0.03, bevelSegments: 3,
        });
        geo.computeBoundingBox();
        const bb = geo.boundingBox;
        const w = bb.max.x - bb.min.x;
        const h = bb.max.y - bb.min.y;
        // pivot each letter on its own center so rotation/scale feel right
        geo.translate(-bb.min.x - w/2, -bb.min.y - h/2, 0);
        letters.push({ geo, w });
        total += w + spacing;
      }
      total -= spacing;

      let cursor = -total / 2;
      letters.forEach(({ geo, w }, i) => {
        const mat = new THREE.MeshStandardMaterial({
          color: 0xffffff, metalness: 0.88, roughness: 0.16,
          emissive: 0x6b30d2, emissiveIntensity: 0.55,
          transparent: true, opacity: 0,
        });
        const m = new THREE.Mesh(geo, mat);
        const targetX = cursor + w/2;
        const targetY = -0.2;
        const targetZ = 0.4;
        const spawnAt = 2.4 + i * 0.20;
        const spinDir = i % 2 === 0 ? 1 : -1;

        m.userData = { targetX, targetY, targetZ, spawnAt, duration: 0.95, spinDir };
        m.position.set(targetX, targetY, targetZ - 6);
        m.rotation.z = spinDir * Math.PI * 6;
        m.scale.setScalar(0.35);
        scene.add(m);
        letterMeshes.push(m);

        cursor += w + spacing;
      });
    });

    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
    const easeOutQuint = (t) => 1 - Math.pow(1 - t, 5);
    const easeOutBack  = (t) => {
      const c1 = 1.70158, c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    };

    const clock = new THREE.Clock();
    const start = performance.now();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const elapsed = (performance.now() - start) / 1000;

      // Gears arrive
      const arr = Math.min(elapsed / 2.2, 1);
      const arrEased = easeOutCubic(arr);
      gears.forEach((g) => {
        const s = g.userData;
        g.position.x = s.x;
        g.position.y = s.y - 5 * (1 - arrEased);
        g.position.z = s.startZ * (1 - arrEased);
        const chaotic = (1 - arrEased) * 9 * s.dir;
        const meshed  = 0.6 * s.dir / (s.teeth / 12);
        g.rotation.z += (chaotic + meshed * arrEased) * dt;
      });

      // Letters: each spins in like a coin/gear and snaps into place
      let flashContrib = 0;
      letterMeshes.forEach((m) => {
        const u = m.userData;
        const raw = (elapsed - u.spawnAt) / u.duration;
        const t = Math.max(0, Math.min(1, raw));
        if (raw <= 0) {
          m.material.opacity = 0;
          m.scale.setScalar(0.35);
          return;
        }
        const easedZ = easeOutCubic(t);
        const easedSpin = easeOutQuint(t);
        const easedScale = easeOutBack(t);

        m.position.z = u.targetZ - 6 + 6 * easedZ;
        m.rotation.z = u.spinDir * Math.PI * 6 * (1 - easedSpin);
        m.scale.setScalar(0.35 + 0.65 * easedScale);
        m.material.opacity = Math.min(1, t * 2.2);

        // Flash burst at the moment of lock-in
        const lockT = (elapsed - u.spawnAt) - u.duration * 0.85;
        if (lockT > 0 && lockT < 0.18) {
          flashContrib += (1 - lockT / 0.18) * 0.55;
        }
      });
      flashLight.intensity = flashContrib * 7;

      // Camera drift
      camera.position.x = Math.sin(elapsed * 0.18) * 0.4;
      camera.position.y = Math.cos(elapsed * 0.22) * 0.2;
      camera.lookAt(0, 0, 0);

      stars.rotation.z += dt * 0.012;

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
