<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Adafruit — Gears Intro</title>
  <link rel="alternate"
        type="application/json+oembed"
        href="https://jwcooper.github.io/oembed-test/chart.oembed.json"
        title="Adafruit Gears Intro">
  <style>
    html, body { margin: 0; padding: 0; background: #05010a; overflow: hidden; height: 100%; }
    #stage { display: block; width: 100%; height: 100%; }
    .reduced-motion-fallback {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      color: #fff; font: 800 clamp(2rem, 8vw, 5rem)/1 system-ui, sans-serif;
      letter-spacing: 0.12em;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #05010a 70%);
    }
    @media (prefers-reduced-motion: reduce) {
      #stage { display: none; }
      .reduced-motion-fallback { display: flex; }
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="reduced-motion-fallback" aria-label="Adafruit">ADAFRUIT</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

    const canvas = document.getElementById('stage');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05010a);
    scene.fog = new THREE.Fog(0x05010a, 6, 26);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 0, 12);

    function resize() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    new ResizeObserver(resize).observe(canvas);
    resize();

    scene.add(new THREE.AmbientLight(0x404060, 0.55));

    const keyLight = new THREE.DirectionalLight(0xffd9a6, 1.6);
    keyLight.position.set(5, 4, 6);
    scene.add(keyLight);

    const purpleRim = new THREE.PointLight(0x9d4edd, 7, 30);
    purpleRim.position.set(-6, 2, -3);
    scene.add(purpleRim);

    const cyanRim = new THREE.PointLight(0x22d3ee, 5, 30);
    cyanRim.position.set(6, -3, -3);
    scene.add(cyanRim);

    const flashLight = new THREE.PointLight(0xffffff, 0, 25);
    flashLight.position.set(0, 0, 2);
    scene.add(flashLight);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 500;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPositions[i * 3]     = (Math.random() - 0.5) * 70;
      starPositions[i * 3 + 1] = (Math.random() - 0.5) * 50;
      starPositions[i * 3 + 2] = -Math.random() * 35 - 5;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.55 })
    );
    scene.add(stars);

    function createGear({ teeth = 16, root = 0.85, tip = 1.0, hole = 0.3, depth = 0.32 }) {
      const shape = new THREE.Shape();
      const step = (Math.PI * 2) / teeth;
      const pt = (a, r) => [Math.cos(a) * r, Math.sin(a) * r];
      for (let i = 0; i < teeth; i++) {
        const a0 = i * step;
        if (i === 0) shape.moveTo(...pt(a0, root));
        shape.lineTo(...pt(a0 + step * 0.20, tip));
        shape.lineTo(...pt(a0 + step * 0.60, tip));
        shape.lineTo(...pt(a0 + step * 0.80, root));
        shape.lineTo(...pt(a0 + step,        root));
      }
      const holePath = new THREE.Path();
      holePath.absarc(0, 0, hole, 0, Math.PI * 2, true);
      shape.holes.push(holePath);
      return new THREE.ExtrudeGeometry(shape, {
        depth, bevelEnabled: true, bevelSegments: 3,
        bevelSize: 0.04, bevelThickness: 0.04, curveSegments: 12,
      });
    }

    const gold   = new THREE.MeshStandardMaterial({ color: 0xc88a3a, metalness: 0.95, roughness: 0.22 });
    const bronze = new THREE.MeshStandardMaterial({ color: 0x8a5a22, metalness: 0.92, roughness: 0.38 });
    const steel  = new THREE.MeshStandardMaterial({ color: 0x42424f, metalness: 0.95, roughness: 0.28 });

    const gearSpecs = [
      { teeth: 22, scale: 1.7,  x: -3.6, y: 0.5,  mat: gold,   dir:  1, startZ: -10 },
      { teeth: 12, scale: 1.0,  x: -1.6, y: -0.7, mat: bronze, dir: -1, startZ:  -8 },
      { teeth: 18, scale: 1.35, x:  0.7, y: 0.9,  mat: gold,   dir:  1, startZ: -12 },
      { teeth: 10, scale: 0.85, x:  2.3, y: -0.4, mat: steel,  dir: -1, startZ:  -7 },
      { teeth: 14, scale: 1.1,  x:  3.8, y: 0.6,  mat: bronze, dir:  1, startZ:  -9 },
      { teeth:  8, scale: 0.7,  x: -2.4, y: 1.7,  mat: steel,  dir:  1, startZ: -11 },
      { teeth:  8, scale: 0.7,  x:  1.7, y: -1.6, mat: steel,  dir: -1, startZ:  -8 },
    ];

    const gears = gearSpecs.map((spec) => {
      const mesh = new THREE.Mesh(createGear({ teeth: spec.teeth }), spec.mat);
      mesh.scale.setScalar(spec.scale);
      mesh.userData = spec;
      mesh.position.set(spec.x, spec.y - 5, spec.startZ);
      mesh.rotation.z = Math.random() * Math.PI * 2;
      scene.add(mesh);
      return mesh;
    });

    let textMesh = null;
    new FontLoader().load(
      'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json',
      (font) => {
        const geo = new TextGeometry('ADAFRUIT', {
          font, size: 0.95, height: 0.22,
          curveSegments: 8, bevelEnabled: true,
          bevelThickness: 0.025, bevelSize: 0.025, bevelSegments: 3,
        });
        geo.computeBoundingBox();
        const w = geo.boundingBox.max.x - geo.boundingBox.min.x;
        geo.translate(-w / 2, -2.7, 0);
        const mat = new THREE.MeshStandardMaterial({
          color: 0xffffff, metalness: 0.85, roughness: 0.18,
          emissive: 0x4a1f7a, emissiveIntensity: 0.5,
          transparent: true, opacity: 0,
        });
        textMesh = new THREE.Mesh(geo, mat);
        textMesh.position.z = -1.5;
        scene.add(textMesh);
      }
    );

    const easeOutCubic   = (t) => 1 - Math.pow(1 - t, 3);
    const easeInOutCubic = (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

    const clock = new THREE.Clock();
    const start = performance.now();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const elapsed = (performance.now() - start) / 1000;

      const arrival = Math.min(elapsed / 3.0, 1);
      const arrEased = easeOutCubic(arrival);

      gears.forEach((gear) => {
        const s = gear.userData;
        gear.position.x = s.x;
        gear.position.y = s.y - 5 * (1 - arrEased);
        gear.position.z = s.startZ * (1 - arrEased);

        const chaoticSpin = (1 - arrEased) * 9 * s.dir;
        const meshedSpin  = 0.7 * s.dir / (s.teeth / 12);
        gear.rotation.z += (chaoticSpin + meshedSpin * arrEased) * dt;
      });

      if (textMesh) {
        const tT = Math.max(0, Math.min(1, (elapsed - 2.6) / 1.4));
        textMesh.material.opacity = easeInOutCubic(tT);
        textMesh.position.y = -0.15 * (1 - easeInOutCubic(tT));

        const flashT = (elapsed - 2.6) / 0.45;
        flashLight.intensity = (flashT >= 0 && flashT <= 1) ? (1 - flashT) * 9 : 0;
      }

      camera.position.x = Math.sin(elapsed * 0.15) * 0.35;
      camera.position.y = Math.cos(elapsed * 0.20) * 0.18;
      camera.lookAt(0, -0.4, 0);

      stars.rotation.z += dt * 0.012;

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
