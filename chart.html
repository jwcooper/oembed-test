  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Temperature Sample Chart</title>
    <link rel="alternate"
          type="application/json+oembed"
          href="https://jwcooper.github.io/oembed-test/chart.oembed.json"
          title="Temperature Sample Chart">
    <style>
      body { margin: 0; padding: 1rem; font-family: system-ui, sans-serif; }
      canvas { max-width: 100%; height: auto; }
    </style>
  </head>
  <body>
    <canvas id="chart" width="600" height="400"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
      new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
          labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
          datasets: [{
            label: 'Temperature (°C)',
            data: [22, 23, 21, 24, 25, 23, 22],
            borderColor: 'rgb(75, 192, 192)',
            tension: 0.2
          }]
        }
      });
    </script>
  </body>
  </html>
