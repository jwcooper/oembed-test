<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hello — Adafruit oEmbed Example</title>
  <link rel="alternate"
        type="application/json+oembed"
        href="https://adafruit.github.io/Adafruit_Learning_System_Embeds/example/oembed.json"
        title="Hello — Adafruit oEmbed Example">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1a0f2e; }
    body {
      display: grid;
      place-items: center;
      color: #fff;
      font-family: system-ui, sans-serif;
      text-align: center;
    }
    h1 { margin: 0 0 0.5rem; font-size: clamp(1.5rem, 6vw, 3rem); font-weight: 800; letter-spacing: 0.05em; }
    p  { margin: 0; opacity: 0.7; font-size: clamp(0.9rem, 2.5vw, 1.1rem); }
  </style>
</head>
<body>
  <main>
    <h1>Hello from Adafruit</h1>
    <p>Replace this with your embedded content.</p>
  </main>
</body>
</html>
